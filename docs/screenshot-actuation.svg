    </linearGradient>
  </defs>
  <rect width="900" height="320" rx="22" fill="url(#bg3)"/>
  <text x="32" y="44" font-size="18" font-family="Segoe UI, Arial" fill="#1d1a16">Density → Ultrasonic Response</text>

  <rect x="32" y="84" width="256" height="180" rx="16" fill="#ffffff" stroke="#1d1a16" stroke-width="1.5"/>
